# ============================================================
# amban.io — Release pipeline
#
# Produces a downloadable Android APK for tagged releases and
# uploads it as a GitHub Release asset. While the project is still
# on the alpha track with no Play Store submission (ROADMAP.md
# Phase 17 is explicitly out-of-scope for the 0.1.x line), this
# workflow ships a *debug-signed* APK — NOT an unsigned one.
#
# Signing — why debug, and why a project-owned debug keystore
# -----------------------------------------------------------
# Every build environment (a developer laptop, a fresh CI runner)
# auto-generates its own `~/.android/debug.keystore` on first use.
# Two debug APKs built on different machines therefore carry
# different signing certificates, and Android refuses to upgrade
# an installed app in place when the signature changes — the user
# sees "App not installed — package conflicts with existing
# package". To avoid that, the repo commits a project-owned debug
# keystore at `android/app/debug.keystore` and wires it into
# `android/app/build.gradle` via `signingConfigs.debug`. Every
# build — local or CI — signs with the same certificate, so APKs
# from any source upgrade each other cleanly.
#
# This is safe to commit. Debug keystores are never accepted by
# the Play Store; Google's own default debug key is itself a
# well-known public secret. Release signing (Play-ready keystore,
# upload-key separation) is a separate track and lands with
# ROADMAP.md Phase 16 follow-ups.
#
# Triggers:
#   - push of a tag matching `v*` (e.g. `v0.1.1`)
#   - manual `workflow_dispatch` with a version input (for dry
#     runs and pre-release rebuilds without re-tagging)
#
# What this pipeline does NOT do (by design):
#   - No Play Store upload.
#   - No *release* signing. Debug-signed only. Release-signing
#     plumbing is tracked separately.
#   - No iOS build (needs macOS + signing; tracked separately).
#   - No commit-back of version-sync rewrites.
#
# Reproducibility: JDK, Node, Gradle, and the Android SDK all come
# from `flake.nix` so CI, local, and future release boxes build
# byte-identically (modulo reproducible-timestamp caveats in the
# Android build itself).
# ============================================================

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for dry-run builds (e.g. v0.1.1)"
        required: true
        default: "v0.1.3"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # required to create the GitHub Release + upload assets

# ------------------------------------------------------------
# Expected SHA-256 fingerprint of the committed debug-signing
# certificate (`android/app/debug.keystore`). The "Verify APK
# signature" step below asserts that the built APK's signer
# matches this value byte-for-byte. If this ever fails, it
# means the keystore was replaced, corrupted, or the Gradle
# config silently fell back to the runner's auto-generated
# debug keystore — all of which would reintroduce the
# "package conflicts" upgrade problem on real devices.
#
# Regenerating the keystore is an intentional, tracked change:
# update this value in the same commit that rotates the key.
# ------------------------------------------------------------
env:
  EXPECTED_DEBUG_CERT_SHA256: "D9:65:07:67:16:0E:C5:E3:51:A2:19:40:C5:85:BD:BA:DE:7A:3F:FD:6A:EC:38:7A:48:EF:3F:F0:32:70:CD:DF"

jobs:
  android-apk:
    name: Build Android debug-signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so `git rev-parse --short HEAD` works in Vite

      # ----------------------------------------------------------
      # Resolve the version string once so every downstream step
      # agrees on it. Tag pushes use the tag (e.g. `v0.1.1`);
      # manual dispatches use the input.
      # ----------------------------------------------------------
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ inputs.version }}"
          else
            RAW="${GITHUB_REF#refs/tags/}"
          fi
          # Strip any leading "v" to get the bare semver.
          BARE="${RAW#v}"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "raw=$RAW" >> "$GITHUB_OUTPUT"
          echo "bare=$BARE" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Version: $RAW (bare $BARE, commit $SHORT_SHA)"

      # ----------------------------------------------------------
      # Sync every version-bearing file in the tree against the tag.
      #
      # `scripts/bump-version.sh` is idempotent: it FORCES every
      # location (package.json, package-lock.json,
      # android/app/build.gradle versionName+versionCode, doc-comment
      # examples, and this workflow's own dispatch default) to match
      # the target. If the tree already matched (a human ran the
      # script locally before tagging), this is a no-op. If the tree
      # lagged (the human only tagged), this rewrites the files so
      # the built APK carries the correct versionName, About-row
      # shows the correct version, and the bundle's injected
      # `__APP_VERSION__` reflects the tag.
      #
      # We do NOT commit the result back to `main`. The rewritten
      # files exist only inside this CI workspace for the duration
      # of the build. To persist them, run the script locally before
      # tagging (recommended) or open a follow-up PR by hand.
      # The build provenance still points at the tagged commit.
      # ----------------------------------------------------------
      - name: Sync repo version to tag
        run: |
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh "${{ steps.version.outputs.bare }}"
          # Emit a diff summary for the job log so a skimmer can see
          # whether CI had to rewrite anything or the tree was already
          # in sync at tag time.
          if git diff --quiet; then
            echo "Tree already in sync with tag — no files rewritten."
          else
            echo "Files rewritten to match tag ${{ steps.version.outputs.raw }}:"
            git diff --stat
          fi

      # ----------------------------------------------------------
      # Sanity-check that the project-owned debug keystore is
      # present and readable BEFORE any Gradle invocation. If it's
      # missing, `assembleDebug` would silently fall back to the
      # runner's auto-generated keystore, producing an APK signed
      # with a different certificate from every previous release —
      # the exact problem the committed keystore was added to fix.
      #
      # Failing here is cheaper (seconds) than noticing the signer
      # mismatch after a 10-minute Gradle build.
      # ----------------------------------------------------------
      - name: Verify debug keystore is present
        run: |
          set -euo pipefail
          KEYSTORE="android/app/debug.keystore"
          if [ ! -f "$KEYSTORE" ]; then
            echo "::error::Project-owned debug keystore not found at $KEYSTORE."
            echo "         The repo must ship this file so every build signs"
            echo "         with the same certificate. See android/app/build.gradle."
            exit 1
          fi
          SIZE=$(stat -c '%s' "$KEYSTORE")
          echo "Debug keystore present at $KEYSTORE (${SIZE} bytes)."

      # ----------------------------------------------------------
      # Nix does all the heavy lifting: JDK 21, Android SDK,
      # Gradle, Node, the lot — pinned by flake.lock.
      # ----------------------------------------------------------
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v11
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v7

      # ----------------------------------------------------------
      # Warm Gradle/npm caches across runs. Gradle caches are keyed
      # on the build files so any dep bump invalidates cleanly.
      # ----------------------------------------------------------
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ----------------------------------------------------------
      # Build the web bundle first. `GIT_COMMIT` is consumed by
      # vite.config.ts so the About panel shows the CI SHA, not
      # whatever happened to be checked out locally.
      # ----------------------------------------------------------
      - name: Install web dependencies
        run: nix develop --command npm ci
        env:
          GIT_COMMIT: ${{ steps.version.outputs.short_sha }}

      - name: Typecheck
        run: nix develop --command npm run typecheck

      - name: Lint
        run: nix develop --command npm run lint

      - name: Build web bundle
        run: nix develop --command npm run build
        env:
          GIT_COMMIT: ${{ steps.version.outputs.short_sha }}

      # ----------------------------------------------------------
      # Privacy gate — same check as CI. A release build must never
      # regress on this, so we repeat the grep rather than trusting
      # that CI already ran on this ref.
      # ----------------------------------------------------------
      - name: Privacy gate — no network symbols in bundle
        run: |
          set -euo pipefail
          FORBIDDEN_PATTERNS=(
            "sentry.io"
            "mixpanel.com"
            "amplitude.com"
            "posthog.com"
            "firebaseio.com"
            "googleanalytics"
            "google-analytics"
            "segment.io"
          )
          FOUND=0
          for pattern in "${FORBIDDEN_PATTERNS[@]}"; do
            if grep -r --include='*.js' --include='*.css' --include='*.html' -l -- "$pattern" dist >/dev/null 2>&1; then
              echo "::error::Forbidden network reference '$pattern' found in dist/."
              FOUND=1
            fi
          done
          [ "$FOUND" -eq 0 ] || exit 1
          echo "Privacy gate passed."

      # ----------------------------------------------------------
      # Sync the web bundle into the Android project and build.
      # `assembleDebug` produces `app-debug.apk`, signed with the
      # project-owned keystore at `android/app/debug.keystore` via
      # the `signingConfigs.debug` block in
      # `android/app/build.gradle`. Installable on any device with
      # "Install unknown apps" allowed.
      # ----------------------------------------------------------
      - name: Capacitor sync (android)
        run: nix develop --command npx cap sync android

      - name: Assemble debug-signed APK
        run: nix develop --command bash -c "cd android && ./gradlew --no-daemon assembleDebug"

      # ----------------------------------------------------------
      # Verify the built APK's signing certificate matches the
      # project-owned debug keystore.
      #
      # Uses `apksigner` from the Android SDK inside the Nix dev
      # shell (where ANDROID_HOME + build-tools are pinned by the
      # flake). We compare the signer's SHA-256 fingerprint against
      # the EXPECTED_DEBUG_CERT_SHA256 env var above.
      #
      # If this step fails, STOP — the built APK would not upgrade
      # cleanly against any previously-published release, and every
      # downstream device would hit "package conflicts" on install.
      # ----------------------------------------------------------
      - name: Verify APK signature against project keystore
        env:
          EXPECTED_DEBUG_CERT_SHA256: ${{ env.EXPECTED_DEBUG_CERT_SHA256 }}
          APK_PATH: android/app/build/outputs/apk/debug/app-debug.apk
        # Inlined (no nested heredoc). We run the verification
        # through `nix develop --command bash -eu -c '<script>'` so
        # the Android SDK path + apksigner resolve off ANDROID_HOME
        # from the flake's shellHook. Variables referenced inside
        # the single-quoted script are NOT expanded by the outer
        # GitHub runner shell — the inner bash reads them from the
        # environment block above.
        run: |
          nix develop --command bash -eu -c '
            APK="$APK_PATH"
            if [ ! -f "$APK" ]; then
              echo "::error::APK not found at $APK"
              exit 1
            fi

            # apksigner ships with the Android SDK build-tools. The
            # Nix flake installs several build-tools versions; pick
            # the newest on disk so we are not locked to a specific
            # number. We use a shell glob + ls because GNU find
            # inside $(...) misbehaves under `nix develop --command`
            # in some environments (returns empty capture despite
            # working standalone) — the glob path is simpler and
            # byte-identical in effect.
            APKSIGNER=$(ls -d "$ANDROID_HOME"/build-tools/*/apksigner 2>/dev/null | sort -V | tail -n1)
            if [ -z "$APKSIGNER" ] || [ ! -x "$APKSIGNER" ]; then
              echo "::error::apksigner not found under $ANDROID_HOME/build-tools"
              echo "  (looked for: $ANDROID_HOME/build-tools/*/apksigner)"
              ls -la "$ANDROID_HOME/build-tools" || true
              exit 1
            fi
            echo "Using apksigner: $APKSIGNER"

            # Full verify output for the job log.
            VERIFY_OUT=$("$APKSIGNER" verify --print-certs "$APK")
            echo "$VERIFY_OUT"

            # Extract the signer-1 SHA-256, strip spaces + colons,
            # uppercase so the comparison is formatting-agnostic.
            ACTUAL=$(echo "$VERIFY_OUT" \
              | grep -i "Signer #1 certificate SHA-256 digest" \
              | head -n1 \
              | awk -F": " "{print \$2}" \
              | tr -d " :" \
              | tr "[:lower:]" "[:upper:]")

            EXPECTED=$(echo "$EXPECTED_DEBUG_CERT_SHA256" \
              | tr -d " :" \
              | tr "[:lower:]" "[:upper:]")

            if [ -z "$ACTUAL" ]; then
              echo "::error::Could not read signer SHA-256 from apksigner output."
              exit 1
            fi

            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error::APK signing certificate does NOT match the project keystore."
              echo "  expected: $EXPECTED"
              echo "  actual:   $ACTUAL"
              echo ""
              echo "This means one of:"
              echo "  - android/app/build.gradle signingConfigs.debug was not applied"
              echo "  - the committed debug.keystore was replaced without updating"
              echo "    EXPECTED_DEBUG_CERT_SHA256 in this workflow"
              echo "  - Gradle silently fell back to the runner auto-generated keystore"
              echo ""
              echo "Fix by restoring the original keystore, or by updating"
              echo "EXPECTED_DEBUG_CERT_SHA256 (and documenting the key rotation)."
              exit 1
            fi

            echo "APK signed with expected project debug certificate: $ACTUAL"
          '

      # ----------------------------------------------------------
      # Stage the artifact with a versioned filename so the GitHub
      # release asset is self-describing after download.
      # ----------------------------------------------------------
      - name: Stage APK
        id: stage
        run: |
          set -euo pipefail
          mkdir -p artifacts
          SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$SRC" ]; then
            echo "::error::APK not found at $SRC"
            exit 1
          fi
          OUT="artifacts/amban-${{ steps.version.outputs.raw }}-android-debug.apk"
          cp "$SRC" "$OUT"
          sha256sum "$OUT" > "$OUT.sha256"
          ls -lh artifacts/
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          echo "sha=$OUT.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: amban-${{ steps.version.outputs.raw }}-android-debug
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

      # ----------------------------------------------------------
      # Only publish a GitHub Release on a tag push. Manual runs
      # stop at the workflow-artifact stage — useful for dry runs.
      # ----------------------------------------------------------
      - name: Publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.raw }}
          name: amban ${{ steps.version.outputs.raw }} (alpha)
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            ${{ steps.stage.outputs.apk }}
            ${{ steps.stage.outputs.sha }}
          body: |
            ## amban ${{ steps.version.outputs.raw }} — alpha preview

            > Know your number. Own your day.

            This is an **alpha** build for on-device testing. It is a
            *debug-signed* APK (signed with a project-owned debug keystore
            committed to the repo so every release shares the same signing
            certificate and can cleanly upgrade in place). Intended for
            side-loading onto Android phones — no Play Store listing yet
            (tracked as ROADMAP.md Phase 17).

            ### Install

            1. Download `amban-${{ steps.version.outputs.raw }}-android-debug.apk`.
            2. On your Android phone, allow "Install unknown apps" for your
               browser or file manager.
            3. Tap the APK to install.

            Upgrading from a previous alpha? Just install — every release
            from v0.1.1 onwards is signed with the same project-owned debug
            key and will upgrade in place. (If you hit "package conflicts
            with existing package" from a pre-v0.1.1 build, uninstall the
            old copy with `adb uninstall io.amban.app` and reinstall. This
            is a one-time migration.)

            ### Verify

            Integrity (file hash):

            ```
            sha256sum -c amban-${{ steps.version.outputs.raw }}-android-debug.apk.sha256
            ```

            Signer (project debug certificate):

            ```
            apksigner verify --print-certs amban-${{ steps.version.outputs.raw }}-android-debug.apk
            # expected SHA-256:
            # D9:65:07:67:16:0E:C5:E3:51:A2:19:40:C5:85:BD:BA:DE:7A:3F:FD:6A:EC:38:7A:48:EF:3F:F0:32:70:CD:DF
            ```

            ### What you get

            - 100% local. No accounts, no sync, no network requests.
            - Onboarding → Home → Daily Log → Insights → Settings, all wired.
            - Two-tier logging: per-entry spend capture with end-of-day
              confirmation, editable until local midnight.
            - Local notifications for the daily prompt, upcoming bills, and
              salary day.
            - Light + dark themes, haptics, reduce-motion aware.

            ### Known caveats for alpha

            - Debug-signed APK (not Play-signed). Expect an
              "unknown developer" prompt on install — this is normal for
              side-loaded apps.
            - iOS build is not included in this release.
            - Data export is a best-effort JSON dump; no import path yet.
              "Reset app" is the only clean-slate path.

            ---

            Built from commit `${{ steps.version.outputs.short_sha }}`.
